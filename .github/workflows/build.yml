name: Build DUCO Miner for CH32V003

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:                # cho phép chạy tay

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build all environments
        run: |
          pio run

      - name: Organize firmware per board
        shell: bash
        run: |
          mkdir -p firmware

          # Liệt kê tất cả thư mục build, mỗi thư mục tương ứng một environment
          for build_dir in .pio/build/*/; do
            # Lấy tên environment (tên thư mục)
            env_name=$(basename "$build_dir")

            # Tên file nguồn
            src="$build_dir/firmware.bin"

            # Nếu file tồn tại, copy với tên mới
            if [ -f "$src" ]; then
              cp "$src" "firmware/${env_name}.bin"
              echo "Copied ${env_name}.bin"
            else
              echo "WARNING: firmware.bin not found for ${env_name}"
            fi
          done

      - name: Upload board-specific firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CH32V003-DUCO-firmware
          path: firmware/*.bin
          if-no-files-found: error
          retention-days: 14
