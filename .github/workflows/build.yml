name: Build DUCO Miner for CH32V003 (NoneOS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install RISC‑V toolchain (xPack)
        run: |
          wget -q https://github.com/xpack-dev-tools/riscv-none-elf-gcc-xpack/releases/download/v13.2.0-2/xpack-riscv-none-elf-gcc-13.2.0-2-linux-x64.tar.gz
          tar xf xpack-riscv-none-elf-gcc-13.2.0-2-linux-x64.tar.gz -C /tmp
          echo "/tmp/xpack-riscv-none-elf-gcc-13.2.0-2/bin" >> $GITHUB_PATH

      - name: Build firmware
        run: |
          make clean
          make -j$(nproc)

      - name: Verify firmware symbols
        run: |
          riscv-none-elf-nm firmware.elf | grep -w "T main" || {
            echo "MISSING main symbol!"
            exit 1
          }

      - name: 🧪 Verify DUCO‑S1A hash test by SHA‑1 constants
        run: |
          echo "Disassembling firmware..."
          riscv-none-elf-objdump -d firmware.elf > disasm.txt
          echo "Searching for SHA‑1 constants..."
          constants="5a827999 6ed9eba1 8f1bbcdc ca62c1d6 67452301 efcdab89 98badcfe 10325476 c3d2e1f0"
          found=0
          for const in $constants; do
            if grep -qi "$const" disasm.txt; then
              echo "✅ Constant 0x${const} found"
              found=$((found + 1))
            else
              echo "⚠️  Constant 0x${const} not found (may be optimized)"
            fi
          done
          echo "Found $found / 9 SHA‑1 constants"
          if [ "$found" -ge 6 ]; then
            echo "✅ Hash test logic verified (enough constants present)"
          else
            echo "❌ Too few SHA‑1 constants found – firmware may be incomplete!"
            exit 1
          fi

      - name: 🔍 Verify DUCOID variable present
        run: |
          if riscv-none-elf-nm firmware.elf | grep -w "ducoid"; then
            echo "✅ ducoid_chars variable found – DUCOID logic present"
          else
            echo "❌ ducoid_chars variable missing – firmware may be incomplete!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CH32V003-NoneOS-firmware
          path: firmware.bin
