name: Build DUCO Miner for CH32V003 (NoneOS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install RISC‑V toolchain (xPack)
        run: |
          wget -q https://github.com/xpack-dev-tools/riscv-none-elf-gcc-xpack/releases/download/v13.2.0-2/xpack-riscv-none-elf-gcc-13.2.0-2-linux-x64.tar.gz
          tar xf xpack-riscv-none-elf-gcc-13.2.0-2-linux-x64.tar.gz -C /tmp
          echo "/tmp/xpack-riscv-none-elf-gcc-13.2.0-2/bin" >> $GITHUB_PATH

      - name: Build firmware
        run: |
          make clean
          make -j$(nproc)

      - name: Verify firmware symbols
        run: |
          riscv-none-elf-nm firmware.elf | grep -w "T main" || {
            echo "MISSING main symbol!"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CH32V003-NoneOS-firmware
          path: firmware.bin
