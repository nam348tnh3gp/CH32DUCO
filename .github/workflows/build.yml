name: Build DUCO Miner for CH32V003 (NoneOS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache PlatformIO packages (bao gồm toolchain)
      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-noneos-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-noneos-

      # Cài đặt PlatformIO và platform CH32V (tự động kéo toolchain)
      - name: Install PlatformIO and toolchain
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          pio pkg install -p ch32v -t toolchain-riscv || true
          pio platform install https://github.com/Community-PIO-CH32V/platform-ch32v.git

      # Build firmware bằng Makefile, tự động tìm toolchain RISC‑V
      - name: Build firmware
        run: |
          # Tìm thư mục chứa toolchain RISC‑V (có thể là toolchain-riscv hoặc toolchain-riscv-windows)
          TOOLCHAIN_DIR=$(find ~/.platformio/packages -maxdepth 1 -type d -name "toolchain-riscv*" | head -1)
          if [ -z "$TOOLCHAIN_DIR" ]; then
            echo "Toolchain RISC‑V not found!"
            exit 1
          fi
          echo "Using toolchain at: $TOOLCHAIN_DIR"
          export PATH="$TOOLCHAIN_DIR/bin:$PATH"

          # Kiểm tra trình biên dịch
          if ! command -v riscv-wch-elf-gcc &> /dev/null; then
            # Thử tên khác (ví dụ riscv-none-elf-gcc)
            if command -v riscv-none-elf-gcc &> /dev/null; then
              echo "Found riscv-none-elf-gcc, adjusting Makefile..."
              sed -i 's/riscv-wch-elf-/riscv-none-elf-/g' Makefile
            else
              echo "No RISC‑V compiler found!"
              exit 1
            fi
          fi

          make clean
          make -j$(nproc)

      # Kiểm tra symbol main trong firmware
      - name: Verify firmware symbols
        run: |
          TOOLCHAIN_DIR=$(find ~/.platformio/packages -maxdepth 1 -type d -name "toolchain-riscv*" | head -1)
          export PATH="$TOOLCHAIN_DIR/bin:$PATH"
          riscv-wch-elf-nm firmware.elf | grep -w "T main" || {
            riscv-none-elf-nm firmware.elf | grep -w "T main" || {
              echo "MISSING main symbol in firmware.elf!"
              exit 1
            }
          }
          echo "Firmware OK"

      # Đóng gói artifact
      - name: Prepare artifact
        run: |
          mkdir -p output
          cp firmware.bin output/DUCO_CH32V003_NoneOS.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: CH32V003-NoneOS-firmware
          path: output/*.bin
          if-no-files-found: error
          retention-days: 14
