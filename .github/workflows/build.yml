name: Build DUCO Miner for CH32V003 (NoneOS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache PlatformIO packages (bao gồm toolchain)
      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-noneos-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-noneos-

      # Cài đặt PlatformIO và platform CH32V (tự động kéo toolchain)
      - name: Install PlatformIO and toolchain
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          pio pkg install -p ch32v -t toolchain-riscv || true
          pio platform install https://github.com/Community-PIO-CH32V/platform-ch32v.git

      # Build firmware bằng Makefile, tự động tìm toolchain RISC‑V
      - name: Install Linux RISC‑V toolchain
        run: |
          wget -q https://github.com/Community-PIO-CH32V/toolchain-riscv-linux/releases/download/gcc12/toolchain-riscv-linux.tar.gz
          tar xf toolchain-riscv-linux.tar.gz -C ~/.platformio/packages/
          echo "Toolchain installed"

      - name: Build firmware
        run: |
          TOOLCHAIN_DIR=~/.platformio/packages/toolchain-riscv-linux
          if [ ! -d "$TOOLCHAIN_DIR/bin" ]; then
            echo "Toolchain not found at $TOOLCHAIN_DIR"
            exit 1
          fi
          export PATH="$TOOLCHAIN_DIR/bin:$PATH"
          echo "Using toolchain at: $TOOLCHAIN_DIR"
          
          make clean
          make -j$(nproc)

      # Kiểm tra symbol main trong firmware
      - name: Verify firmware symbols
        run: |
          TOOLCHAIN_DIR=$(find ~/.platformio/packages -maxdepth 1 -type d -name "toolchain-riscv*" | head -1)
          export PATH="$TOOLCHAIN_DIR/bin:$PATH"
          riscv-wch-elf-nm firmware.elf | grep -w "T main" || {
            riscv-none-elf-nm firmware.elf | grep -w "T main" || {
              echo "MISSING main symbol in firmware.elf!"
              exit 1
            }
          }
          echo "Firmware OK"

      # Đóng gói artifact
      - name: Prepare artifact
        run: |
          mkdir -p output
          cp firmware.bin output/DUCO_CH32V003_NoneOS.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: CH32V003-NoneOS-firmware
          path: output/*.bin
          if-no-files-found: error
          retention-days: 14
