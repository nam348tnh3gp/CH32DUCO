name: Build all CH32V003 variants

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cnlohr/ch32v003fun:latest   # ← container có sẵn toolchain
    strategy:
      fail-fast: false
      matrix:
        board:
          - CH32V003F4U6
          - CH32V003J4M6
          - CH32V003A4M6
          - CH32V003F4P6
          - CH32V003C4U6
          # (thêm các mã chip khác nếu cần)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive   # bắt buộc nếu bạn dùng ch32v003fun như submodule

      - name: Build for ${{ matrix.board }}
        run: |
          make clean
          make CH32V003FUN_BOARD=${{ matrix.board }} all

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: |
            build/*.bin
            build/*.hex
          if-no-files-found: error
