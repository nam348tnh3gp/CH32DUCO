name: Build DUCO Miner for CH32V003 (NoneOS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache PlatformIO (để lấy toolchain RISC‑V)
      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-noneos-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-noneos-

      # Chỉ cài PlatformIO và toolchain, không cài framework Arduino
      - name: Install PlatformIO and toolchain
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          pio platform install https://github.com/Community-PIO-CH32V/platform-ch32v.git
          # Xóa framework Arduino (không cần)
          rm -rf ~/.platformio/packages/framework-arduino-openwch-ch32

      # Build bằng Makefile, sử dụng toolchain RISC‑V từ PlatformIO
      - name: Build firmware
        run: |
          export PATH="$HOME/.platformio/packages/toolchain-riscv/bin:$PATH"
          make clean
          make -j$(nproc)

      # Kiểm tra symbol main phải có trong firmware
      - name: Verify firmware symbols
        run: |
          export PATH="$HOME/.platformio/packages/toolchain-riscv/bin:$PATH"
          riscv-wch-elf-nm firmware.elf | grep -w "T main" || {
            echo "MISSING main symbol in firmware.elf!"
            exit 1
          }
          echo "Firmware OK"

      # Đóng gói artifact
      - name: Prepare artifact
        run: |
          mkdir -p output
          cp firmware.bin output/DUCO_CH32V003_NoneOS.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: CH32V003-NoneOS-firmware
          path: output/*.bin
          if-no-files-found: error
          retention-days: 14
