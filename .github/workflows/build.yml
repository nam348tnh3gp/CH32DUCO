name: Build all CH32V003 variants

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - CH32V003F4U6
          - CH32V003J4M6
          - CH32V003A4M6
          - CH32V003F4P6
          - CH32V003C4U6
          # (thêm các mã chip khác nếu cần)

    env:
      TOOLCHAIN_PATH: /opt/riscv64-unknown-elf-gcc

    steps:
      - name: Checkout repository (cả submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_PATH }}
          key: riscv64-unknown-elf-gcc-from-ch32v003fun-v1

      - name: Install toolchain (từ script của ch32v003fun)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cd lib/ch32fun/ch32v003fun
          chmod +x get_toolchain.sh
          ./get_toolchain.sh
          mkdir -p $TOOLCHAIN_PATH
          tar -xf riscv64-unknown-elf-gcc-*.tar.gz -C $TOOLCHAIN_PATH --strip-components=1
          rm riscv64-unknown-elf-gcc-*.tar.gz

      - name: Set PATH
        run: echo "$TOOLCHAIN_PATH/bin" >> $GITHUB_PATH

      - name: Build for ${{ matrix.board }}
        run: |
          make clean
          make CH32V003FUN_BOARD=${{ matrix.board }} all

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: |
            build/*.bin
            build/*.hex
          if-no-files-found: error
