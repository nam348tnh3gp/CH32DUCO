name: Build DUCO Miner for CH32V003

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Prepare source code (copy to src/)
        shell: bash
        run: |
          echo "==> Creating src/ directory"
          mkdir -p src
          echo "==> Copying source files from root to src/"
          for ext in ino cpp c h hpp S; do
            find . -maxdepth 1 -type f -name "*.${ext}" -exec cp {} src/ \;
          done
          echo "==> Contents of src/:"
          ls -la src/

      - name: Build all environments
        run: pio run

      - name: Verify firmware symbols
        shell: bash
        run: |
          echo "Checking essential symbols..."
          for elf in .pio/build/*/firmware.elf; do
            echo "==> $(basename $(dirname $elf))"
            # Kiểm tra setup, loop, UART_Init – nếu thiếu sẽ exit 1
            riscv-wch-elf-nm "$elf" | grep -E "setup|loop|UART_Init" || {
              echo "MISSING symbols in $elf!"
              exit 1
            }
          done
          echo "All symbols OK"

      - name: Organize firmware per board
        shell: bash
        run: |
          mkdir -p firmware
          for build_dir in .pio/build/*/; do
            env_name=$(basename "$build_dir")
            src="$build_dir/firmware.bin"
            if [ -f "$src" ]; then
              cp "$src" "firmware/${env_name}.bin"
              echo "Copied ${env_name}.bin"
            else
              echo "WARNING: firmware.bin not found for ${env_name}"
            fi
          done

      - name: Upload board-specific firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CH32V003-DUCO-firmware
          path: firmware/*.bin
          if-no-files-found: error
          retention-days: 14
