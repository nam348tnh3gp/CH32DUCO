; PlatformIO Project Configuration for DUCO Miner on CH32V003
; Tất cả các board CH32V003 đều build được

[platformio]
default_envs = 
    ch32v003f4p6_evt_r0
    genericCH32V003F4P6
    genericCH32V003A4M6
    genericCH32V003J4M6
    genericCH32V003F4U6

[env]
platform = https://github.com/Community-PIO-CH32V/platform-ch32v.git
framework = arduino
board_build.core = openwch
board_build.mcu = ch32v003
board_build.f_cpu = 48000000L
monitor_speed = 115200
upload_protocol = wch-link
build_flags =
    -Wall
    -DCH32V003
    -Ofast

; ---------- Board phát triển chính thức ----------
[env:ch32v003f4p6_evt_r0]
board = ch32v003f4p6_evt_r0

; ---------- Generic CH32V003F4P6 (TSSOP-20) ----------
[env:genericCH32V003F4P6]
board = genericCH32V003F4P6

; ---------- CH32V003A4M6 (SOP-16) – dùng chung board F4P6 (cùng chip) ----------
[env:genericCH32V003A4M6]
board = genericCH32V003F4P6

; ---------- CH32V003J4M6 (SOP-8) – dùng chung board F4P6 (cùng chip) ----------
[env:genericCH32V003J4M6]
board = genericCH32V003F4P6

; ---------- Generic CH32V003F4U6 (QFN-20) ----------
[env:genericCH32V003F4U6]
board = genericCH32V003F4U6
